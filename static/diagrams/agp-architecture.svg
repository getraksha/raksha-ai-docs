<svg viewBox="0 0 720 420" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Agent Governance Plane Architecture</title>
  <desc>Three-column architecture: AI Agents on the left connect through the AGP in the center to MCP Tools on the right.</desc>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1a6db5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="420" fill="#f6f8fa" rx="12"/>

  <!-- ── Left column: AI Agents ───────────────────────── -->
  <text x="110" y="38" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#57606a" letter-spacing="0.08em">AI AGENTS</text>

  <g font-family="Inter,sans-serif" font-size="12" fill="#24292f">
    <rect x="30" y="50" width="160" height="36" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
    <text x="110" y="73" text-anchor="middle">billing-agent</text>

    <rect x="30" y="100" width="160" height="36" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
    <text x="110" y="123" text-anchor="middle">checkout-agent</text>

    <rect x="30" y="150" width="160" height="36" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
    <text x="110" y="173" text-anchor="middle">search-agent</text>

    <rect x="30" y="200" width="160" height="36" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
    <text x="110" y="223" text-anchor="middle">deploy-agent</text>

    <rect x="30" y="250" width="160" height="36" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
    <text x="110" y="273" text-anchor="middle">data-agent</text>
  </g>

  <!-- ── Center: AGP ──────────────────────────────────── -->
  <rect x="255" y="30" width="210" height="280" rx="10" fill="#bfdbfe" stroke="#1a6db5" stroke-width="2"/>
  <text x="360" y="55" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#1a6db5" letter-spacing="0.04em">AGENT GOVERNANCE PLANE</text>
  <line x1="270" y1="65" x2="450" y2="65" stroke="#1a6db5" stroke-width="1" opacity="0.4"/>

  <g font-family="Inter,sans-serif" font-size="12.5" fill="#0550ae">
    <text x="280" y="98">✓  Identity verified</text>
    <text x="280" y="138">✓  Policy enforced</text>
    <text x="280" y="178">✓  Cost controlled</text>
    <text x="280" y="218">✓  Blast radius limited</text>
    <text x="280" y="258">✓  Full audit trail</text>
  </g>

  <text x="360" y="295" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#1a6db5">agp · runtime enforcement</text>

  <!-- ── Right column: MCP Tools ─────────────────────── -->
  <text x="610" y="38" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#57606a" letter-spacing="0.08em">MCP TOOLS</text>

  <g font-family="Inter,sans-serif" font-size="12" fill="#24292f">
    <rect x="530" y="50" width="160" height="36" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
    <text x="610" y="73" text-anchor="middle">Payments API</text>

    <rect x="530" y="100" width="160" height="36" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
    <text x="610" y="123" text-anchor="middle">CRM / Data</text>

    <rect x="530" y="150" width="160" height="36" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
    <text x="610" y="173" text-anchor="middle">Infra / K8s</text>

    <rect x="530" y="200" width="160" height="36" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
    <text x="610" y="223" text-anchor="middle">Ext. Services</text>

    <rect x="530" y="250" width="160" height="36" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
    <text x="610" y="273" text-anchor="middle">Databases</text>
  </g>

  <!-- ── Arrows: agents → AGP ────────────────────────── -->
  <g stroke="#1a6db5" stroke-width="1.5" fill="none" marker-end="url(#arr)">
    <line x1="192" y1="68" x2="252" y2="90"/>
    <line x1="192" y1="118" x2="252" y2="120"/>
    <line x1="192" y1="168" x2="252" y2="150"/>
    <line x1="192" y1="218" x2="252" y2="185"/>
    <line x1="192" y1="268" x2="252" y2="220"/>
  </g>

  <!-- ── Arrows: AGP → tools ─────────────────────────── -->
  <g stroke="#1a6db5" stroke-width="1.5" fill="none" marker-end="url(#arr)">
    <line x1="468" y1="90" x2="528" y2="68"/>
    <line x1="468" y1="120" x2="528" y2="118"/>
    <line x1="468" y1="150" x2="528" y2="168"/>
    <line x1="468" y1="185" x2="528" y2="218"/>
    <line x1="468" y1="220" x2="528" y2="258"/>
  </g>

  <!-- ── Bottom label ────────────────────────────────── -->
  <text x="360" y="360" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#57606a" opacity="0.8">Every agent call is intercepted, validated, and recorded — at runtime.</text>
</svg>
